                        <span>🥜</span> בוטנים

    <script>
        let dietary = 'חלבית';
        let pickupTime = 'בוקר';
        let selectedAllergens = [];
        const daysOfWeek = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];

        function setDietary(val) {
            dietary = val;
            document.querySelectorAll('.diet-btn').forEach(b => b.classList.remove('active-btn', 'bg-pink-500', 'text-white'));
            document.getElementById('d-' + val).classList.add('active-btn');
            updatePreview();
        }

        function setPickup(val) {
            pickupTime = val;
            document.querySelectorAll('.pickup-btn').forEach(b => b.classList.remove('active-btn', 'bg-pink-500', 'text-white'));
            document.getElementById('p-' + val).classList.add('active-btn');
        }

        function toggleOtherCakeInput() {
            const cakeSelect = document.getElementById('cakeType');
            const otherCakeInput = document.getElementById('otherCakeDetail');
            if (cakeSelect.value === 'אחר') {
                otherCakeInput.classList.remove('hidden');
                otherCakeInput.focus();
            } else {
                otherCakeInput.classList.add('hidden');
                otherCakeInput.value = '';
            }
        }

        function toggleAllergen(name) {
            const index = selectedAllergens.indexOf(name);
            const buttons = Array.from(document.querySelectorAll('.allergen-btn'));
            const btn = buttons.find(b => b.innerText.includes(name));
            const otherInput = document.getElementById('otherAllergenDetail');
            
            if (index === -1) {
                selectedAllergens.push(name);
                btn.classList.add('active');
                if (name === 'אחר') {
                    otherInput.classList.remove('hidden');
                    otherInput.focus();
                }
            } else {
                selectedAllergens.splice(index, 1);
                btn.classList.remove('active');
                if (name === 'אחר') {
                    otherInput.classList.add('hidden');
                    otherInput.value = '';
                }
            }
            updatePreview();
        }

        function getAllergensString() {
            const otherText = document.getElementById('otherAllergenDetail').value;
            let list = selectedAllergens.filter(a => a !== 'אחר');
            if (selectedAllergens.includes('אחר') && otherText.trim() !== "") {
                list.push(otherText.trim());
            }
            return list.length > 0 ? list.join(', ') : 'אין';
        }

        function generateMessage() {
            const cakeSelect = document.getElementById('cakeType').value;
            const otherCakeText = document.getElementById('otherCakeDetail').value;
            const cake = (cakeSelect === 'אחר') ? (otherCakeText || '---') : (cakeSelect || '---');
            const notes = document.getElementById('notes').value;
            const price = document.getElementById('price').value || '0';
            const dateVal = document.getElementById('orderDate').value;
            const allergensText = getAllergensString();

            let msg = `*סיכום ופירוט הזמנה* 🎂\n\n`;
            msg += `${cake}\n`;
            msg += `עוגה ${dietary}\n`;
            if(notes) msg += `פרטים נוספים: ${notes}\n`;
            msg += `אלרגנים: ${allergensText}\n`;
            
            if(dateVal) {
                const dateObj = new Date(dateVal + 'T12:00:00');
                const dayName = daysOfWeek[dateObj.getDay()];
                const [y, m, d] = dateVal.split('-');
                msg += `תאריך: יום ${dayName}, ${d}/${m}/${y}\n`;
                msg += `איסוף בתיאום מראש\n`;
            }

            msg += `*סה"כ לתשלום: ₪${price}*\n\n`;

            if (selectedAllergens.length === 0) {
                msg += `*פירוט אלרגנים:*\n`;
                msg += `העוגה מכילה /עלולה להכיל כל שאריות עקבות מזעריות של שקדים, בוטנים, אגוזים, חלב, לקטוז ולכן לא מתאימה לבעלי רגישויות או אלרגיות.\n\n`;
            }

            msg += `*נוהל ביטול*\n`;
            msg += `*עד שלושה ימים לפני תוחזר המקדמה לאחר מכן - לא.*\n\n`;
            msg += `יש לבצע העברת מקדמה בסך 100 ₪ פייבוקס / ביט בכדי לסגור את ההזמנה🙏\n\n`;
            msg += `*לאישור וסגירת הזמנה*\n`;
            msg += `*נא לשלוח קראתי ומאשר/ת.*\n\n`;
            msg += `שיהיה במזל טוב ורק בשמחות 🎉🎉`;
            
            return msg;
        }

        function updatePreview() {
            document.getElementById('preview').innerText = generateMessage();
        }

        function copyMsg() {
            const text = generateMessage();
            const el = document.createElement('textarea');
            el.value = text;
            el.style.position = 'fixed';
            el.style.opacity = '0';
            document.body.appendChild(el);
            el.focus(); el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = document.getElementById('copyBtn');
            const orig = btn.innerText;
            btn.innerText = 'הועתק! ✅';
            btn.style.backgroundColor = '#16a34a';
            setTimeout(() => {
                btn.innerText = orig;
                btn.style.backgroundColor = '';
            }, 2000);
        }

        function openGoogleCalendar() {
            const name = document.getElementById('customerName').value || 'לקוח';
            const cakeSelect = document.getElementById('cakeType').value;
            const otherCakeText = document.getElementById('otherCakeDetail').value;
            const cake = (cakeSelect === 'אחר') ? (otherCakeText || 'הזמנה') : (cakeSelect || 'הזמנה');
            const dateVal = document.getElementById('orderDate').value;
            if (!dateVal) { alert("אנא בחרי תאריך 📅"); return; }

            const dateClean = dateVal.replace(/-/g, '');
            const title = encodeURIComponent(`${name}: ${cake}`);
            const dateObj = new Date(dateVal + 'T12:00:00');
            const [y, m, d] = dateVal.split('-');
            const details = encodeURIComponent(`תאריך: יום ${daysOfWeek[dateObj.getDay()]}, ${d}/${m}/${y}\n🕒 איסוף: ${pickupTime}\n💰 מחיר: ${document.getElementById('price').value || '0'}₪\n⚠️ אלרגנים: ${getAllergensString()}\n🥛 סוג: ${dietary}\n📝 הערות: ${document.getElementById('notes').value}`);
            
            window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateClean}T080000/${dateClean}T083000&details=${details}&sf=true&output=xml&colorId=4`, '_blank');
        }

        function copyCalendarDetails() {
            const name = document.getElementById('customerName').value || 'לקוח';
            const cakeSelect = document.getElementById('cakeType').value;
            const cake = (cakeSelect === 'אחר') ? (document.getElementById('otherCakeDetail').value || 'הזמנה') : (cakeSelect || 'הזמנה');
            const dateVal = document.getElementById('orderDate').value;
            
            let calText = `${name}: ${cake}\n`;
            if(dateVal) {
                const [y, m, d] = dateVal.split('-');
                calText += `תאריך: ${d}/${m}/${y} (${daysOfWeek[new Date(dateVal + 'T12:00:00').getDay()]})\n`;
            }
            calText += `זמן איסוף: ${pickupTime}\nמחיר: ${document.getElementById('price').value || '0'}₪\nאלרגנים: ${getAllergensString()}\nסוג: ${dietary}\n`;
            if(document.getElementById('notes').value) calText += `הערות: ${document.getElementById('notes').value}`;

            const el = document.createElement('textarea');
            el.value = calText;
            el.style.position = 'fixed'; el.style.opacity = '0';
            document.body.appendChild(el); el.focus(); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            
            const btn = document.getElementById('copyCalBtn');
            const orig = btn.innerText; btn.innerText = 'הועתק! ✅';
            setTimeout(() => btn.innerText = orig, 2000);
        }

        function resetForm() {
            if(confirm("לנקות את כל הטופס?")) {
                document.getElementById('customerName').value = '';
                document.getElementById('cakeType').value = '';
                document.getElementById('otherCakeDetail').value = '';
                document.getElementById('otherCakeDetail').classList.add('hidden');
                document.getElementById('notes').value = '';
                document.getElementById('price').value = '';
                document.getElementById('orderDate').value = '';
                document.getElementById('otherAllergenDetail').value = '';
                document.getElementById('otherAllergenDetail').classList.add('hidden');
                selectedAllergens = [];
                document.querySelectorAll('.allergen-btn').forEach(b => b.classList.remove('active'));
                setDietary('חלבית');
                setPickup('בוקר');
                updatePreview();
            }
        }
        
        window.onload = updatePreview;
    </script>
</body>
</html>
